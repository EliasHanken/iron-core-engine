name: CI

on:
  push:
    branches: [main]
    # Skip CI on doc-only changes (specs, plans, READMEs, this file's siblings).
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

# A new push to a PR branch supersedes the in-flight run — cancel it instead
# of burning a second runner. Pushes to main are never cancelled (their cache
# saves are what keep PR runs fast).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & test (Windows / MSVC)
    runs-on: windows-latest

    env:
      # vcpkg's `x-gha` binary backend was removed upstream (lukka/run-vcpkg
      # still sets it and prints a warning). Use a local file-based binary
      # cache that we back via actions/cache below.
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite'
      # sccache stores compiled objects in the GitHub Actions cache service,
      # so our own sources (plus FetchContent deps) compile-cache across runs.
      SCCACHE_GHA_ENABLED: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: .github/requirements-ci.txt

      - name: Install glad generator dependency
        run: pip install -r .github/requirements-ci.txt

      - name: Set up MSVC environment
        # Puts cl.exe on PATH — required by the Ninja generator (MSBuild found
        # the compiler itself; Ninja expects a ready vcvars environment).
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache vcpkg binary archives
        # Restore previously-built dep archives. On cache hit, vcpkg install
        # in the Configure step decompresses pre-built packages instead of
        # recompiling GNS + openssl + protobuf + abseil from source (~20 min
        # saved). The key ends in run_id so a fresh cache is SAVED every run:
        # actions/cache skips the save step on an exact-key hit, and vcpkg's
        # ABI hash also covers the MSVC version — so when the runner image
        # updates the toolchain, every archive goes stale and (without the
        # run_id suffix) the rebuild would never be persisted, making every
        # later run repay the full source build.
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-
            vcpkg-bincache-${{ runner.os }}-

      - name: Ensure vcpkg binary cache dir exists
        shell: bash
        run: mkdir -p "${{ github.workspace }}/vcpkg-bincache"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'aa40adda5352e87655b8583cfb2451d5e9e276fd'

      - name: Configure
        # bash shell on Windows runner: pwsh's `${env:VCPKG_ROOT}` interpolation
        # mangles -D...= args to cmake; bash with $VCPKG_ROOT is reliable.
        #
        # Ninja (single-config Debug) instead of MSBuild so sccache can hook in
        # via CMAKE_*_COMPILER_LAUNCHER (MSBuild has no launcher support).
        # /Z7 (Embedded debug info) instead of the /Zi default: sccache cannot
        # cache /Zi compiles (shared PDB writes aren't reproducible). CMP0141
        # must be forced NEW because our cmake_minimum_required(3.20) predates
        # the MSVC_DEBUG_INFORMATION_FORMAT abstraction (3.25) — without it the
        # variable is silently ignored. Local dev builds (build-vk, MSBuild
        # multi-config) are unaffected; this is CI-only.
        shell: bash
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded

      - name: Build
        run: cmake --build build

      - name: sccache stats
        # Hit/miss counts — the first thing to look at if Build gets slow again.
        run: sccache --show-stats

      - name: Smoke test - net-pingpong
        # Ninja is single-config: no Debug/ subdirectory in exe paths.
        run: |
          ./build/games/04-net-pingpong/net-pingpong.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test
        env:
          # GPU-touching tests check this and skip — no real GPU/ICD on the runner.
          IRON_CI: '1'
        # --timeout 60 is a defense-in-depth: if a test hangs despite IRON_CI,
        # ctest kills it as a failure after 60s so we see which one.
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 60
